<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./Home.css">
</head>
<body>
    <div id="main" class="main">
        <h2>Management Board</h2>
        <div id="main-content" >
                <div id="column1" class="column">
                    <div class="column-title">Task Pending </div>
                    <div class="column-body">
                        <button id="add-task">+ Add Task </button>
                        <div class="tasks" id="task1" draggable="true">Task1</div>
                        <div class="tasks" id="task2" draggable="true">Task2</div>
                        <div class="tasks" id="task3" draggable="true">Task3</div>
                        <div class="tasks" id="task4" draggable="true">Task4</div>
                        <div class="tasks" id="task5" draggable="true">Task5</div>
                        <div class="tasks" id="task6" draggable="true">Task6</div>
                    </div>
                </div>
                <div id="column2" class="column">
                    <div class="column-title">Working On</div>
                    <div class="column-body"></div>
                </div>
                <div id="column3" class="column">
                    <div class="column-title">Completed</div>
                    <div class="column-body"></div>
                </div>
        </div>
    </div>
    <script src="./Home.js"></script>
</body>
</html>
